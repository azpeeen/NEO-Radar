<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#050508"/>

  <!-- RIGHT SIDE: large logo centered -->
  <image href="data:image/svg+xml;base64," x="720" y="115" width="400" height="400"/>

  <!-- Orbital ring behind logo -->
  <ellipse cx="920" cy="315" rx="280" ry="115" stroke="#1a6cf6" stroke-width="1.5" fill="none" stroke-opacity="0.18" transform="rotate(-18 920 315)"/>
  <circle cx="1130" cy="220" r="5" fill="#1a6cf6" fill-opacity="0.5"/>
  <circle cx="710" cy="415" r="3.5" fill="#ffffff" fill-opacity="0.2"/>

  <!-- LEFT: Badge -->
  <rect x="56" y="56" width="168" height="22" rx="3" fill="none" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.15"/>
  <text x="140" y="71" font-family="monospace" font-size="10" fill="#5a6175" text-anchor="middle" letter-spacing="2">DATA · JPL HORIZONS</text>

  <!-- Headline -->
  <text x="56" y="200" font-family="'Space Grotesk',sans-serif" font-size="78" font-weight="700" fill="#f0f4ff" letter-spacing="-2">NEO Radar</text>
  <text x="56" y="250" font-family="'Space Grotesk',sans-serif" font-size="20" fill="#8a90a3">Real orbital mechanics for</text>
  <text x="56" y="276" font-family="'Space Grotesk',sans-serif" font-size="20" fill="#8a90a3">Near-Earth Objects.</text>

  <!-- Divider -->
  <line x1="56" y1="318" x2="560" y2="318" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Stats -->
  <text x="56" y="370" font-family="monospace" font-size="36" font-weight="700" fill="#1a6cf6">47</text>
  <text x="56" y="392" font-family="monospace" font-size="10" fill="#5a6175" letter-spacing="2">OBJECTS TRACKED</text>

  <text x="210" y="370" font-family="monospace" font-size="36" font-weight="700" fill="#f0f4ff">RK4</text>
  <text x="210" y="392" font-family="monospace" font-size="10" fill="#5a6175" letter-spacing="2">INTEGRATOR</text>

  <text x="360" y="370" font-family="monospace" font-size="36" font-weight="700" fill="#f0f4ff">366 km</text>
  <text x="360" y="392" font-family="monospace" font-size="10" fill="#5a6175" letter-spacing="2">ACCURACY</text>

  <!-- URL -->
  <text x="56" y="555" font-family="monospace" font-size="15" fill="#1a6cf6" letter-spacing="0.5">neo-radar.onrender.com</text>

  <!-- Bottom line -->
  <rect x="0" y="622" width="1200" height="2" fill="#1a6cf6" fill-opacity="0.35"/>
</svg>
